version: '3.8'
services:
  postgresdb:
    image: postgres:15
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pythonapp:
    build: ./fetcher
    restart: "no"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_HOST: postgresdb
      DB_PORT: ${DB_PORT}
      NEWS_API_KEY: ${NEWS_API_KEY}
    depends_on:
        - postgresdb 
volumes:
    postgres_data: